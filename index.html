<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding + Move Planner · Apr 5 – May 3, 2026</title>
  <style>
    /* ==============================================================
       VARIABLES & THEMING
    ============================================================== */
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --border: #dee2e6;
      --text: #212529;
      --text2: #6c757d;
      --accent: #5c6bc0;
      --accent-light: #e8eaf6;
      --wedding: #c2185b;
      --wedding-light: #fce4ec;
      --moving: #1565c0;
      --moving-light: #e3f2fd;
      --both: #6a1b9a;
      --both-light: #f3e5f5;
      --high: #c62828;
      --medium: #e65100;
      --low: #2e7d32;
      --done-bg: #f1f8e9;
      --overdue-bg: #fff8e1;
      --overdue-border: #ff8f00;
      --rolled-bg: #fce4ec;
      --rolled-border: #e91e63;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.12);
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3248;
      --text: #e2e4ec;
      --text2: #7b8099;
      --accent: #7986cb;
      --accent-light: #1e2240;
      --wedding-light: #2d1225;
      --moving-light: #0d1e35;
      --both-light: #211230;
      --done-bg: #141e14;
      --overdue-bg: #221a08;
      --rolled-bg: #2d1225;
      --shadow: 0 1px 4px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* ==============================================================
       RESET
    ============================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ==============================================================
       APP HEADER
    ============================================================== */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--shadow);
    }
    .app-header h1 {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      margin-right: auto;
    }
    .app-header h1 .accent { color: var(--accent); }
    .app-header h1 .muted { font-weight: 400; color: var(--text2); font-size: 13px; }
    .header-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    /* ==============================================================
       LAYOUT
    ============================================================== */
    .main-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: calc(100vh - 49px);
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 8px;
    }
    .main-content {
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .main-layout { grid-template-columns: 1fr; height: auto; }
      .sidebar { display: none; }
      .main-content { padding: 10px; }
    }

    /* ==============================================================
       SUMMARY CARDS
    ============================================================== */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }
    .card-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .card-value { font-size: 22px; font-weight: 700; }
    .card-value.c-danger  { color: var(--high); }
    .card-value.c-warning { color: var(--medium); }
    .card-value.c-success { color: var(--low); }
    .card-value.c-wedding { color: var(--wedding); }
    .card-value.c-moving  { color: var(--moving); }
    .card-value.c-neutral { color: var(--text2); }

    /* ==============================================================
       TODAY FOCUS
    ============================================================== */
    .today-focus {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .today-focus h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .focus-tasks { display: flex; flex-wrap: wrap; gap: 6px; }
    .focus-chip {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 500;
    }
    .focus-chip.nice { opacity: 0.6; border-style: dashed; }

    /* ==============================================================
       QUICK ADD
    ============================================================== */
    .quick-add-bar {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .quick-add-bar input[type="text"] { flex: 1; min-width: 180px; }

    /* ==============================================================
       CONTROLS BAR
    ============================================================== */
    .controls-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .fg { display: flex; align-items: center; gap: 5px; }
    .fg label { font-size: 11px; color: var(--text2); white-space: nowrap; }

    /* ==============================================================
       FORM CONTROLS
    ============================================================== */
    select, input[type="text"], input[type="date"], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }

    /* ==============================================================
       BUTTONS
    ============================================================== */
    .btn {
      padding: 5px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.88; color: #fff; }
    .btn-danger { color: var(--high); border-color: var(--high); }
    .btn-danger:hover { background: #ffebee; color: var(--high); }
    [data-theme="dark"] .btn-danger:hover { background: #2d1212; }
    .btn-sm { padding: 3px 8px; font-size: 11px; }

    /* ==============================================================
       CALENDAR SIDEBAR
    ============================================================== */
    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .cal-day {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 1px;
      border: 1px solid transparent;
      transition: background 0.12s;
      user-select: none;
    }
    .cal-day:hover { background: var(--accent-light); }
    .cal-day.active { background: var(--accent-light); border-color: var(--accent); }
    .cal-day.today-day { border-left: 3px solid var(--accent); }
    .cal-day.blocked-day { opacity: 0.45; background: var(--surface2); }
    .cal-day.wedding-day { background: var(--wedding-light); border-color: var(--wedding); }
    .cal-day.move-day { background: var(--moving-light); border-color: var(--moving); }
    .cal-day-row { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
    .cal-day-date { font-size: 12px; font-weight: 600; }
    .cal-day-wd { font-size: 10px; color: var(--text2); }
    .cal-day-count { font-size: 10px; background: var(--accent); color: #fff; border-radius: 8px; padding: 0 5px; min-width: 16px; text-align: center; }
    .cal-day-count.all-done { background: var(--low); }
    .cal-tags { display: flex; gap: 2px; margin-top: 1px; flex-wrap: wrap; }
    .cal-tag { font-size: 9px; padding: 0 3px; border-radius: 3px; }

    /* ==============================================================
       TASK TABLE
    ============================================================== */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { position: sticky; top: 0; z-index: 10; }
    th {
      background: var(--surface2);
      padding: 9px 11px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text2);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--accent); }
    th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
    th.sort-desc::after { content: ' ↓'; color: var(--accent); }
    td {
      padding: 7px 11px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Row states */
    tr.row-done td { background: var(--done-bg); opacity: 0.72; }
    tr.row-done .task-name { text-decoration: line-through; color: var(--text2); }
    tr.row-overdue { border-left: 3px solid var(--overdue-border); }
    tr.row-overdue td { background: var(--overdue-bg); }
    tr.row-rolled td { background: var(--rolled-bg); }
    tr.row-today { border-left: 3px solid var(--accent); }

    .edit-btn { opacity: 0; transition: opacity 0.1s; }
    tr:hover .edit-btn { opacity: 1; }

    .task-name { font-weight: 500; }
    .task-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Assignee badges */
    .ab { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; padding:2px 7px; border-radius:10px; white-space:nowrap; }
    .ab-john  { background:#e8eaf6; color:#3949ab; }
    .ab-yoon  { background:#fce4ec; color:#c2185b; }
    .ab-other { background:#e0f2f1; color:#00695c; }
    [data-theme="dark"] .ab-john  { background:#1e2240; color:#9fa8da; }
    [data-theme="dark"] .ab-yoon  { background:#2d1225; color:#f48fb1; }
    [data-theme="dark"] .ab-other { background:#0d2420; color:#80cbc4; }
    .date-label { white-space: nowrap; font-size: 12px; }
    .date-wd { font-size: 10px; color: var(--text2); }

    /* ==============================================================
       BADGES & PILLS
    ============================================================== */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-wedding  { background: var(--wedding-light); color: var(--wedding); }
    .badge-moving   { background: var(--moving-light);  color: var(--moving); }
    .badge-both     { background: var(--both-light);    color: var(--both); }

    .badge-high   { background: #ffebee; color: var(--high); }
    .badge-medium { background: #fff3e0; color: var(--medium); }
    .badge-low    { background: #e8f5e9; color: var(--low); }
    [data-theme="dark"] .badge-high   { background: #2d1212; }
    [data-theme="dark"] .badge-medium { background: #2d1e08; }
    [data-theme="dark"] .badge-low    { background: #122412; }

    .badge-notstarted  { background: var(--surface2); color: var(--text2); }
    .badge-inprogress  { background: #e3f2fd; color: #1565c0; }
    .badge-done        { background: #e8f5e9; color: #2e7d32; }
    [data-theme="dark"] .badge-inprogress { background: #0d1e35; color: #90caf9; }
    [data-theme="dark"] .badge-done       { background: #122412; color: #81c784; }

    .mini-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 600;
      margin-left: 4px;
      vertical-align: middle;
    }
    .mb-rolled  { background: var(--wedding); color: #fff; }
    .mb-overdue { background: var(--overdue-border); color: #fff; }
    .mb-today   { background: var(--accent); color: #fff; }

    .effort-pill {
      font-size: 11px;
      background: var(--surface2);
      color: var(--text2);
      padding: 1px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ==============================================================
       MODAL
    ============================================================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 22px 24px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); padding: 0 4px; line-height: 1; }
    .form-group { margin-bottom: 13px; }
    .form-group > label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea { width: 100%; }
    .form-group textarea { min-height: 72px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-check { display: flex; align-items: center; gap: 7px; }
    .form-check input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .modal-meta { font-size: 11px; color: var(--text2); margin-top: 10px; }

    /* ==============================================================
       COUNTDOWN BAR
    ============================================================== */
    .countdown-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 7px 20px;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .cd-item { display: flex; align-items: center; gap: 8px; }
    .cd-label { color: var(--text2); }
    .cd-days { font-weight: 800; font-size: 18px; line-height: 1; }
    .cd-days.cd-urgent { color: var(--high); }
    .cd-days.cd-soon   { color: var(--medium); }
    .cd-days.cd-ok     { color: var(--low); }
    .cd-date { font-size: 11px; color: var(--text2); }
    .cd-sep  { width: 1px; height: 28px; background: var(--border); }
    .cd-progress { flex: 1; min-width: 120px; }
    .cd-pbar-wrap { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 3px; }
    .cd-pbar { height: 100%; border-radius: 3px; transition: width 0.4s; }

    /* ==============================================================
       EFFORT BARS (calendar sidebar)
    ============================================================== */
    .effort-bar-wrap { margin-top: 3px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .effort-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .eb-ok      { background: var(--low); }
    .eb-warn    { background: var(--medium); }
    .eb-over    { background: var(--high); }
    .cal-effort-label { font-size: 9px; color: var(--text2); margin-top: 1px; }

    /* ==============================================================
       BLOCKED TASKS (dependency)
    ============================================================== */
    tr.row-blocked td { opacity: 0.65; }
    tr.row-blocked .task-name { color: var(--text2); }
    .mb-blocked { background: #546e7a; color: #fff; }

    /* ==============================================================
       DEPENDENCY PICKER (modal)
    ============================================================== */
    .dep-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; min-height: 22px; }
    .dep-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px; border-radius: 8px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--accent-light); color: var(--accent);
    }
    .dep-chip:hover { background: #ffebee; color: var(--high); border-color: var(--high); }
    .dep-chip.dep-done { background: var(--done-bg); color: var(--low); border-color: var(--low); }
    .dep-results {
      border: 1px solid var(--border); border-radius: 5px;
      max-height: 140px; overflow-y: auto; display: none;
      background: var(--surface);
    }
    .dep-results.open { display: block; }
    .dep-result-item {
      padding: 6px 10px; cursor: pointer; font-size: 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }
    .dep-result-item:last-child { border-bottom: none; }
    .dep-result-item:hover { background: var(--accent-light); color: var(--accent); }

    /* ==============================================================
       MISC
    ============================================================== */
    .empty-state { text-align: center; padding: 36px; color: var(--text2); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ==============================================================
       VIEW TABS
    ============================================================== */
    .view-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .view-tabs .vt-label { font-size: 11px; color: var(--text2); margin-right: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .vt {
      padding: 4px 12px;
      border-radius: 5px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      transition: all 0.12s;
    }
    .vt:hover { background: var(--accent-light); color: var(--accent); }
    .vt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ==============================================================
       BULK EDIT TOOLBAR
    ============================================================== */
    .bulk-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-md);
      max-width: 90vw;
    }
    .bulk-bar.visible { display: flex; }
    .bulk-count { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; margin-right: 4px; }
    .bulk-sep { width: 1px; height: 22px; background: var(--border); }

    /* ==============================================================
       SELECTED ROW
    ============================================================== */
    tr.row-selected td { background: var(--accent-light) !important; outline: 2px solid var(--accent); outline-offset: -1px; }

    /* ==============================================================
       GROUP HEADER ROW (grouped views)
    ============================================================== */
    .group-header-row td {
      background: var(--surface2);
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text2);
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid var(--border);
    }
    .group-header-row:hover td { background: var(--accent-light); color: var(--accent); }
    .group-header-row .gh-toggle { font-size: 10px; margin-right: 6px; display: inline-block; transition: transform 0.15s; }
    .group-header-row.collapsed .gh-toggle { transform: rotate(-90deg); }
    .group-header-row .gh-stats { font-size: 11px; font-weight: 400; color: var(--text2); margin-left: 8px; }
    .group-header-row .gh-done-btn { float:right; font-size:11px; padding:1px 7px; border-radius:4px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; }
    .group-header-row .gh-done-btn:hover { background:var(--low); color:#fff; border-color:var(--low); }

    tr.group-hidden { display: none; }

    @media print {
      .app-header, .sidebar, .controls-bar, .quick-add-bar,
      .header-actions, .today-focus, .edit-btn, .bulk-bar, .view-tabs { display: none !important; }
      .main-layout { display: block; height: auto; }
      .main-content { overflow: visible; padding: 0; }
      .table-wrapper { box-shadow: none; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header class="app-header">
  <h1>💍 Wedding <span class="accent">&amp;</span> Move Planner <span class="muted">Apr 5 – May 3, 2026</span></h1>
  <div class="header-actions">
    <button class="btn btn-sm" id="btn-today">📌 Today</button>

  tasks = JSON.parse(JSON.stringify(SEED_TASKS));
}

// ==============================================================
// SECTION 4: UTILITY FUNCTIONS
// ==============================================================

function addDays(ds, n) {
  const d = new Date(ds + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function isWeekend(ds) {
  const day = new Date(ds + "T00:00:00").getDay();
  return day === 0 || day === 6;
}

function isBlocked(ds) { return BLOCKED_DATES.includes(ds); }

function fmt(ds) {
  return new Date(ds + "T00:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric" });
}
function fmtFull(ds) {
  return new Date(ds + "T00:00:00").toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
}
function weekday(ds) {
  return new Date(ds + "T00:00:00").toLocaleDateString("en-US", { weekday:"short" });
}

function getAllDates() {
  const out = []; let cur = PLAN_START;
  while (cur <= PLAN_END) { out.push(cur); cur = addDays(cur, 1); }
  return out;
}

function uid() { return "t" + Date.now() + Math.floor(Math.random() * 9999); }

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Days between two ISO date strings (b - a)
function daysBetween(a, b) {
  return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00")) / 86400000);
}

// Total effort-hours scheduled on a date (incomplete tasks only)
function dayUsedHours(ds) {
  return tasks
    .filter(t => t.date===ds && !t.completed)
    .reduce((s, t) => s + (EFFORT_HOURS[t.effort] || 1), 0);
}

// Returns true if task has at least one incomplete dependency
function hasBlockedDeps(task) {
  const deps = task.dependsOn || [];
  return deps.some(id => { const d = tasks.find(x=>x.id===id); return d && !d.completed; });
}

// ==============================================================
// SECTION 5: ROLLOVER LOGIC
// ==============================================================
// Algorithm (plain English):
//   1. Identify all incomplete tasks whose date is before APP_TODAY.
//   2. Sort them oldest-first.
//   3. Build a count map: how many non-done tasks already occupy each date.
//   4. For each overdue task, starting from the day after its current date:
//      a. If the candidate date is in the blocked window AND the task is NOT
//         lightweight → skip (increment candidate by 1 day).
//      b. If the current task count on that date meets or exceeds the daily
//         cap → skip.
//      c. Otherwise assign the task to that date, increment rolledOverCount,
//         update the count map, and move on to the next task.
//   5. Tasks that cannot find any eligible date before PLAN_END land on
//      the last day as a fallback (shouldn't happen with current data).
//   6. Persist the updated state.

function runRollover() {
  const today = APP_TODAY;

  // Build live count of non-done tasks per date (AFTER any prior saves)
  const countByDate = {};
  for (const t of tasks) {
    if (!t.completed) countByDate[t.date] = (countByDate[t.date] || 0) + 1;
  }

  const overdue = tasks
    .filter(t => !t.completed && t.date < today)
    .sort((a, b) => a.date.localeCompare(b.date));

  for (const task of overdue) {
    // Remove from current date bucket
    if (countByDate[task.date] > 0) countByDate[task.date]--;

    let candidate = addDays(task.date, 1);
    let placed = false;

    while (candidate <= PLAN_END) {
      const blocked  = isBlocked(candidate);
      const weekend  = isWeekend(candidate);
      const cap      = blocked ? MAX_BLOCKED : weekend ? MAX_WEEKEND : MAX_WEEKDAY;
      const curCount = countByDate[candidate] || 0;

      if (blocked && !task.lightweight) { candidate = addDays(candidate, 1); continue; }
      if (curCount >= cap)              { candidate = addDays(candidate, 1); continue; }

      task.date = candidate;
      task.rolledOverCount = (task.rolledOverCount || 0) + 1;
      countByDate[candidate] = curCount + 1;
      placed = true;
      break;
    }

    if (!placed) task.date = PLAN_END; // fallback
  }

  saveTasks();
}

// ── Summary cards ──────────────────────────────────────────────
function renderCards() {
  const today = APP_TODAY;
  const total    = tasks.length;
  const done     = tasks.filter(t => t.completed).length;
  const rem      = tasks.filter(t => !t.completed).length;
  const overdue  = tasks.filter(t => !t.completed && t.date < today).length;
  const rolled   = tasks.filter(t => t.rolledOverCount > 0 && !t.completed).length;
  const wLeft    = tasks.filter(t => !t.completed && (t.project==="Wedding"||t.project==="Both")).length;
  const mLeft    = tasks.filter(t => !t.completed && (t.project==="Moving"||t.project==="Both")).length;

  const cards = [
    { label:"Total",         val:total,  cls:""         },
    { label:"Completed",     val:done,   cls:"c-success" },
    { label:"Remaining",     val:rem,    cls:rem>20?"c-warning":"" },
    { label:"Overdue",       val:overdue,cls:overdue>0?"c-danger":"c-success" },
    { label:"Rolled Over",   val:rolled, cls:rolled>0?"c-warning":"c-neutral" },
    { label:"Wedding Left",  val:wLeft,  cls:"c-wedding" },
    { label:"Moving Left",   val:mLeft,  cls:"c-moving"  },
  ];
  document.getElementById("summary-cards").innerHTML =
    cards.map(c=>`<div class="card"><div class="card-label">${c.label}</div><div class="card-value ${c.cls}">${c.val}</div></div>`).join("");
}

    .sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);

// ── Calendar sidebar ───────────────────────────────────────────
function renderCal() {
  const byDate = {};
  for (const t of tasks) { if (!byDate[t.date]) byDate[t.date]=[]; byDate[t.date].push(t); }

  let html = "";
  for (const ds of getAllDates()) {
    const ts    = byDate[ds] || [];
    const total = ts.length;
    const done  = ts.filter(t=>t.completed).length;
    const hasW  = ts.some(t=>t.project==="Wedding"||t.project==="Both");
    const hasM  = ts.some(t=>t.project==="Moving"||t.project==="Both");

    let cls = "cal-day";
    if (ds === APP_TODAY)    cls += " today-day";
    if (isBlocked(ds))       cls += " blocked-day";
    if (ds === WEDDING_DATE) cls += " wedding-day";
    else if (ds === MOVE_DATE) cls += " move-day";
    if (filters.date === ds) cls += " active";

    const cntCls = total>0 && done===total ? "cal-day-count all-done" : "cal-day-count";
    let tags = "";
    if (hasW)        tags += `<span class="cal-tag" style="background:var(--wedding-light);color:var(--wedding)">W</span>`;
    if (hasM)        tags += `<span class="cal-tag" style="background:var(--moving-light);color:var(--moving)">M</span>`;
    if (isBlocked(ds)) tags += `<span class="cal-tag" style="background:var(--surface2);color:var(--text2)">✈</span>`;
    if (ds===WEDDING_DATE) tags += `<span class="cal-tag" style="background:var(--wedding-light);color:var(--wedding)">💍</span>`;
    if (ds===MOVE_DATE)    tags += `<span class="cal-tag" style="background:var(--moving-light);color:var(--moving)">📦</span>`;

    const used   = dayUsedHours(ds);
    const budget = dayBudget(ds);
    const pct    = Math.min(100, Math.round(used / budget * 100));
    const ebCls  = pct >= 100 ? "eb-over" : pct >= 75 ? "eb-warn" : "eb-ok";
    const effortLabel = used > 0 ? `${used.toFixed(used%1?1:0)}h / ${budget}h` : "";

    html += `
      <div class="${cls}" data-date="${ds}" onclick="filterByDate('${ds}')">
        <div class="cal-day-row">
          <span class="cal-day-date">${fmt(ds)}</span>
          <span class="cal-day-wd">${weekday(ds)}</span>
          ${total>0 ? `<span class="${cntCls}">${done}/${total}</span>` : ""}
        </div>
        ${tags ? `<div class="cal-tags">${tags}</div>` : ""}
        ${used > 0 ? `
          <div class="effort-bar-wrap"><div class="effort-bar ${ebCls}" style="width:${pct}%"></div></div>
          <div class="cal-effort-label">${effortLabel}</div>` : ""}
      </div>`;
  }
  document.getElementById("cal-strip").innerHTML = html;
}

// ── Task table ─────────────────────────────────────────────────
function renderTable() {
  const today = APP_TODAY;
  let rows = [...tasks];

  if (filters.project)   rows = rows.filter(t=>t.project===filters.project);
  if (filters.status)    rows = rows.filter(t=>t.status===filters.status);
  if (filters.priority)  rows = rows.filter(t=>t.priority===filters.priority);
  if (filters.date)      rows = rows.filter(t=>t.date===filters.date);
  if (filters.rolledOnly)  rows = rows.filter(t=>t.rolledOverCount>0);
  if (filters.overdueOnly) rows = rows.filter(t=>!t.completed && t.date<today);
  if (filters.assignee === "__unassigned__") rows = rows.filter(t=>!t.delegatedTo);
  else if (filters.assignee) rows = rows.filter(t=>t.delegatedTo===filters.assignee);

  rows.sort((a,b)=>{
    let av,bv;
    switch(sortCfg.field){
      case "date":     av=a.date;                    bv=b.date;     break;
      case "priority": av=PRIORITY_ORDER[a.priority];bv=PRIORITY_ORDER[b.priority]; break;
      case "project":  av=a.project;                 bv=b.project;  break;
      case "status":   av=STATUS_ORDER[a.status];    bv=STATUS_ORDER[b.status];   break;
      case "assignee": av=a.delegatedTo||"zzz";      bv=b.delegatedTo||"zzz";     break;
      default: av=a.date; bv=b.date;
    }
    if(av<bv) return sortCfg.dir==="asc"?-1:1;
    if(av>bv) return sortCfg.dir==="asc"?1:-1;
    if(sortCfg.field!=="date"){
      if(a.date<b.date) return -1; if(a.date>b.date) return 1;
    }
    return PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority];
  });

  // Update sort indicators
  document.querySelectorAll("th[data-sort]").forEach(th=>{
    th.classList.remove("sort-asc","sort-desc");
    if(th.dataset.sort===sortCfg.field)
      th.classList.add(sortCfg.dir==="asc"?"sort-asc":"sort-desc");
  });

  const tbody = document.getElementById("task-tbody");
  if (!rows.length) {
    tbody.innerHTML=`<tr><td colspan="11" class="empty-state">No tasks match the current filters.</td></tr>`;
    updateSelectAll();
    return;
  }

  tbody.innerHTML = rows.map(t => taskRow(t, today)).join("");
  updateSelectAll();
}

// ==============================================================
// SECTION 6B: SHARED ROW BUILDER
// ==============================================================

function taskRow(t, today) {
  const isToday = t.date===today;
  const overdue = !t.completed && t.date<today;
  const rolled  = t.rolledOverCount>0;
  const done    = t.completed;
  const blocked = !done && hasBlockedDeps(t);
  const sel     = selectedIds.has(t.id);

  let rowCls = sel ? "row-selected" : "";
  if(!sel){
    if(done)         rowCls="row-done";
    else if(blocked) rowCls="row-blocked";
    else if(overdue) rowCls="row-overdue";
    else if(rolled)  rowCls="row-rolled";
    else if(isToday) rowCls="row-today";
  }

  const projCls = "badge badge-"+t.project.toLowerCase().replace(/ /g,"");
  const prioCls = "badge badge-"+t.priority.toLowerCase();
  const statCls = "badge badge-"+t.status.toLowerCase().replace(/ /g,"");

  let nameHtml = `<span class="task-name">${esc(t.task)}</span>`;
  if(blocked)          nameHtml+=`<span class="mini-badge mb-blocked">🔒 blocked</span>`;
  if(rolled && !done)  nameHtml+=`<span class="mini-badge mb-rolled">↩ ${fmt(t.originalDate)}</span>`;
  if(overdue)          nameHtml+=`<span class="mini-badge mb-overdue">⚠ overdue</span>`;
  if(isToday && !done) nameHtml+=`<span class="mini-badge mb-today">today</span>`;
  if(t.niceToHave)    nameHtml+=` <span style="font-size:10px;color:var(--text2)">✨</span>`;
  if(t.notes)         nameHtml+=`<div class="task-meta">${esc(t.notes)}</div>`;

  return `<tr class="${rowCls}" data-id="${t.id}">
    <td style="text-align:center"><input type="checkbox" class="sel-cb" ${sel?"checked":""} onchange="toggleSelect('${t.id}',this.checked)" style="accent-color:var(--accent)"></td>
    <td style="text-align:center"><input type="checkbox" ${done?"checked":""} onchange="toggleTask('${t.id}',this.checked)" style="accent-color:var(--accent)"></td>
    <td class="date-label">${fmt(t.date)}<br><span class="date-wd">${weekday(t.date)}</span></td>
    <td>${nameHtml}</td>
    <td style="font-size:11px;color:var(--text2);white-space:nowrap">${esc(t.category)}</td>
    <td><span class="${projCls}">${t.project}</span></td>
    <td><span class="${prioCls}">${pIcon(t.priority)} ${t.priority}</span></td>
    <td><span class="${statCls}">${t.status}</span></td>
    <td><span class="effort-pill">${t.effort}</span></td>
    <td>${t.delegatedTo ? assigneeBadge(t.delegatedTo) : `<span style="color:var(--text2);font-size:11px">—</span>`}</td>
    <td><button class="btn btn-sm edit-btn" onclick="openModal('${t.id}')">Edit</button></td>
  </tr>`;
}

// ==============================================================
// SECTION 6C: VIEW SWITCHER
// ==============================================================

function renderCurrentView() {
  if(currentView === "table") {
    renderTable();
  } else {
    const groupKey = currentView; // "category" | "assignee" | "priority"
    renderGroupedView(groupKey);
  }
}

function setView(view) {
  currentView = view;
  document.querySelectorAll(".vt").forEach(b => b.classList.toggle("active", b.dataset.view===view));
  // Show sort controls only in table view
  document.getElementById("s-field").parentElement.style.display = view==="table" ? "" : "none";
  renderCurrentView();
}

// ==============================================================
// SECTION 6D: GROUPED VIEW
// ==============================================================

function renderGroupedView(groupKey) {
  const today = APP_TODAY;

  // Apply same filters as table view
  let rows = [...tasks];
  if(filters.project)   rows = rows.filter(t=>t.project===filters.project);
  if(filters.status)    rows = rows.filter(t=>t.status===filters.status);
  if(filters.priority)  rows = rows.filter(t=>t.priority===filters.priority);
  if(filters.date)      rows = rows.filter(t=>t.date===filters.date);
  if(filters.rolledOnly)  rows = rows.filter(t=>t.rolledOverCount>0);
  if(filters.overdueOnly) rows = rows.filter(t=>!t.completed && t.date<today);
  if(filters.assignee==="__unassigned__") rows = rows.filter(t=>!t.delegatedTo);
  else if(filters.assignee) rows = rows.filter(t=>t.delegatedTo===filters.assignee);

  // Sort within groups by date then priority
  rows.sort((a,b)=>{
    if(a.date<b.date) return -1; if(a.date>b.date) return 1;
    return PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority];
  });

  // Extract group key value from each task
  function groupVal(t) {
    if(groupKey==="category") return t.category || "Uncategorized";
    if(groupKey==="assignee") return t.delegatedTo || "Unassigned";
    if(groupKey==="priority") return t.priority;
    return "—";
  }

  // Build ordered groups
  const groupOrder = groupKey==="priority"
    ? ["High","Medium","Low"]
    : [...new Set(rows.map(groupVal))].sort();

  const grouped = {};
  rows.forEach(t => {
    const k = groupVal(t);
    if(!grouped[k]) grouped[k] = [];
    grouped[k].push(t);
  });

  // Render into the same table
  const tbody = document.getElementById("task-tbody");
  if(!rows.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="empty-state">No tasks match the current filters.</td></tr>`;
    updateSelectAll();
    return;
  }

  let html = "";
  const keys = groupKey==="priority" ? groupOrder.filter(k=>grouped[k]) : Object.keys(grouped).sort();

  keys.forEach(key => {
    const group = grouped[key] || [];
    if(!group.length) return;
    const done  = group.filter(t=>t.completed).length;
    const total = group.length;
    const collapsed = collapsedGroups.has(key);
    const hidCls = collapsed ? "group-hidden" : "";

    // Group header row
    let headerAccent = "";
    if(groupKey==="priority") {
      headerAccent = key==="High"  ? "border-left:3px solid var(--high)"
                   : key==="Medium"? "border-left:3px solid var(--medium)"
                   :                 "border-left:3px solid var(--low)";
    } else if(groupKey==="assignee") {
      const cls = key==="John"?"--accent:#3949ab":key==="Yoon"?"--accent:#c2185b":"--accent:#00695c";
    }

    html += `<tr class="group-header-row${collapsed?" collapsed":""}" onclick="toggleGroup('${esc(key)}')">
      <td colspan="11" style="${headerAccent}">
        <span class="gh-toggle">▾</span>
        ${esc(key)}
        <span class="gh-stats">${done}/${total} done</span>
        <button class="gh-done-btn" onclick="event.stopPropagation();markGroupDone('${esc(key)}','${groupKey}')">✓ All done</button>
      </td>
    </tr>`;

    group.forEach(t => {
      html += taskRow(t, today).replace('<tr class="', `<tr data-group="${esc(key)}" class="${hidCls} `);
    });
  });

  tbody.innerHTML = html;
  updateSelectAll();
}

function toggleGroup(key) {
  if(collapsedGroups.has(key)) collapsedGroups.delete(key);
  else collapsedGroups.add(key);
  // Toggle display on rows and header arrow without full re-render
  document.querySelectorAll(`tr[data-group="${CSS.escape(key)}"]`).forEach(tr=>{
    tr.classList.toggle("group-hidden");
  });
  const hdr = [...document.querySelectorAll(".group-header-row")].find(r=>r.querySelector("td").textContent.trim().startsWith(key));
  if(hdr) hdr.classList.toggle("collapsed");
}

function markGroupDone(key, groupKey) {
  tasks.forEach(t => {
    let val = groupKey==="category" ? (t.category||"Uncategorized")
            : groupKey==="assignee" ? (t.delegatedTo||"Unassigned")
            : t.priority;
    if(val===key && !t.completed) { t.completed=true; t.status="Done"; }
  });
  saveTasks(); renderAll();
}

// ==============================================================
// SECTION 6E: MULTI-SELECT
// ==============================================================

function toggleSelect(id, checked) {
  if(checked) selectedIds.add(id);
  else selectedIds.delete(id);
  renderBulkBar();
  updateSelectAll();
  // Re-style the row without full re-render
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if(row) row.classList.toggle("row-selected", checked);
}

function toggleSelectAll(checked) {
  // Operate on currently visible rows
  document.querySelectorAll("tr[data-id]").forEach(row => {
    const id = row.dataset.id;
    if(checked) selectedIds.add(id);
    else selectedIds.delete(id);
    row.classList.toggle("row-selected", checked);
  });
  document.querySelectorAll(".sel-cb").forEach(cb => cb.checked = checked);
  renderBulkBar();
}

function updateSelectAll() {
  const allCbs = [...document.querySelectorAll(".sel-cb")];
  const th = document.getElementById("th-select-all");
  if(!th || !allCbs.length) return;
  const allChecked = allCbs.every(cb=>cb.checked);
  const someChecked = allCbs.some(cb=>cb.checked);
  th.checked = allChecked;
  th.indeterminate = !allChecked && someChecked;
}

function renderBulkBar() {
  const bar = document.getElementById("bulk-bar");
  const n   = selectedIds.size;
  document.getElementById("bulk-count").textContent = `${n} selected`;
  bar.classList.toggle("visible", n > 0);
}

function applyBulkEdit() {
  const status   = document.getElementById("bulk-status").value;
  const priority = document.getElementById("bulk-priority").value;
  const project  = document.getElementById("bulk-project").value;
  const assignee = document.getElementById("bulk-assignee").value.trim();
  const date     = document.getElementById("bulk-date").value;

  if(!status && !priority && !project && !assignee && !date) {
    alert("Choose at least one field to update.");
    return;
  }

  tasks.forEach(t => {
    if(!selectedIds.has(t.id)) return;
    if(status)   { t.status=status; t.completed=(status==="Done"); }
    if(priority)   t.priority=priority;
    if(project)    t.project=project;
    if(assignee)   t.delegatedTo=assignee;
    if(date)       t.date=date;
  });

  // Reset bulk fields
  ["bulk-status","bulk-priority","bulk-project"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("bulk-assignee").value="";
  document.getElementById("bulk-date").value="";

  saveTasks();
  renderAll();
}

function bulkMarkDone() {
  tasks.forEach(t=>{ if(selectedIds.has(t.id)){ t.completed=true; t.status="Done"; } });
  saveTasks(); renderAll();
}

function bulkDelete() {
  const n = selectedIds.size;
  if(!confirm(`Delete ${n} task${n!==1?"s":""}?`)) return;
  tasks = tasks.filter(t=>!selectedIds.has(t.id));
  selectedIds.clear();
  saveTasks(); renderAll();
}

function bulkDeselect() {
  selectedIds.clear();
  renderBulkBar();
  renderCurrentView();
}

function pIcon(p){ return p==="High"?"🔴":p==="Medium"?"🟡":"🟢"; }

function assigneeBadge(name) {
  if(!name) return "";
  const cls = name==="John" ? "ab-john" : name==="Yoon" ? "ab-yoon" : "ab-other";
  const icon = name==="John" ? "👤" : name==="Yoon" ? "👤" : "👥";
  return `<span class="ab ${cls}">${icon} ${esc(name)}</span>`;
}

// Populate the assignee filter with any custom delegate names found in tasks
function renderAssigneeFilter() {
  const sel = document.getElementById("f-assignee");
  const known = new Set(["", "__unassigned__", "John", "Yoon"]);
  const extras = [...new Set(tasks.map(t=>t.delegatedTo).filter(n=>n && !known.has(n)))].sort();
  // Remove old extras (keep first 4 fixed options)
  while(sel.options.length > 4) sel.remove(4);
  extras.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  // Also update datalist
  const dl = document.getElementById("assignee-list");
  const dlKnown = new Set(["John","Yoon"]);
  extras.forEach(name => {
    if(!dlKnown.has(name)){
      const opt = document.createElement("option");
      opt.value = name; dl.appendChild(opt);
    }
  });
}

// ==============================================================
// SECTION 6F: COUNTDOWN BAR
// ==============================================================

function renderCountdown() {
  const today    = APP_TODAY;
  const daysMove    = daysBetween(today, MOVE_DATE);
  const daysWedding = daysBetween(today, WEDDING_DATE);

  function cdClass(d) { return d <= 7 ? "cd-urgent" : d <= 14 ? "cd-soon" : "cd-ok"; }

  // Progress: how far through the plan are we?
  const totalDays   = daysBetween(PLAN_START, PLAN_END);
  const elapsed     = Math.max(0, daysBetween(PLAN_START, today));
  const planPct     = Math.min(100, Math.round(elapsed / totalDays * 100));

  // Task completion progress
  const total = tasks.length;
  const done  = tasks.filter(t=>t.completed).length;
  const taskPct = total ? Math.round(done/total*100) : 0;

  document.getElementById("countdown-bar").innerHTML = `
    <div class="cd-item">
      <span style="font-size:18px">📦</span>
      <div>
        <div><span class="cd-days ${cdClass(daysMove)}">${daysMove < 0 ? "Done!" : daysMove}</span> <span class="cd-label">${daysMove < 0 ? "Move complete" : daysMove===0 ? "Move is TODAY" : "days to move"}</span></div>
        <div class="cd-date">${fmtFull(MOVE_DATE)}</div>
      </div>
    </div>
    <div class="cd-sep"></div>
    <div class="cd-item">
      <span style="font-size:18px">💍</span>
      <div>
        <div><span class="cd-days ${cdClass(daysWedding)}">${daysWedding < 0 ? "Done!" : daysWedding}</span> <span class="cd-label">${daysWedding < 0 ? "Married!" : daysWedding===0 ? "Wedding is TODAY 🎉" : "days to wedding"}</span></div>
        <div class="cd-date">${fmtFull(WEDDING_DATE)}</div>
      </div>
    </div>
    <div class="cd-sep"></div>
    <div class="cd-item cd-progress">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:2px">
          <span>Plan progress</span><span>${planPct}%</span>
        </div>
        <div class="cd-pbar-wrap"><div class="cd-pbar" style="width:${planPct}%;background:var(--accent)"></div></div>
      </div>
    </div>
    <div class="cd-item cd-progress">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:2px">
          <span>Tasks complete</span><span>${done}/${total} (${taskPct}%)</span>
        </div>
        <div class="cd-pbar-wrap"><div class="cd-pbar" style="width:${taskPct}%;background:${taskPct>=75?"var(--low)":taskPct>=40?"var(--medium)":"var(--high)"}"></div></div>
      </div>
    </div>`;
}

// ==============================================================
// SECTION 6H: DEPENDENCY PICKER
// ==============================================================

function renderDepChips() {
  const el = document.getElementById("m-dep-chips");
  if (!editingDeps.length) {
    el.innerHTML = `<span style="font-size:11px;color:var(--text2)">None — search below to add</span>`;
    return;
  }
  el.innerHTML = editingDeps.map(id => {
    const t = tasks.find(x=>x.id===id);
    const label = t ? esc(t.task) : id;
    const done  = t?.completed;
    return `<span class="dep-chip ${done?"dep-done":""}" onclick="removeDep('${id}')" title="Click to remove">${label} ×</span>`;
  }).join("");
}

function depSearch(q) {
  const resultsEl = document.getElementById("m-dep-results");
  if (!q.trim()) { resultsEl.classList.remove("open"); return; }
  const matches = tasks
    .filter(t => t.id !== editingId && !editingDeps.includes(t.id) && t.task.toLowerCase().includes(q.toLowerCase()))
    .slice(0, 8);
  if (!matches.length) { resultsEl.classList.remove("open"); return; }
  resultsEl.classList.add("open");
  resultsEl.innerHTML = matches.map(t =>
    `<div class="dep-result-item" onclick="addDep('${t.id}')">
      <span class="badge badge-${t.project.toLowerCase()}">${t.project}</span>
      ${pIcon(t.priority)} ${esc(t.task)}
      <span style="font-size:10px;color:var(--text2);margin-left:auto">${fmt(t.date)}</span>
    </div>`
  ).join("");
}

function addDep(id) {
  if (!editingDeps.includes(id)) editingDeps.push(id);
  document.getElementById("m-dep-search").value = "";
  document.getElementById("m-dep-results").classList.remove("open");
  renderDepChips();
}

function removeDep(id) {
  editingDeps = editingDeps.filter(x=>x!==id);
  renderDepChips();
}

// ==============================================================
// SECTION 7: INTERACTIONS
// ==============================================================

function toggleTask(id, checked) {
  const t = tasks.find(t=>t.id===id);
  if(!t) return;
  t.completed = checked;
  t.status    = checked ? "Done" : "Not started";
  saveTasks();
  renderAll();
}

function filterByDate(ds) {
  if(filters.date===ds){ filters.date=""; document.getElementById("f-date").value=""; }
  else { filters.date=ds; document.getElementById("f-date").value=ds; }
  renderTable();
  renderCal();
}

function openModal(id) {
  const t = id ? tasks.find(x=>x.id===id) : null;
  editingId = id || null;
  document.getElementById("modal-title").textContent = t ? "Edit Task" : "New Task";
  document.getElementById("m-task").value       = t?.task||"";
  document.getElementById("m-date").value       = t?.date||APP_TODAY;
  document.getElementById("m-project").value    = t?.project||"Wedding";
  document.getElementById("m-category").value   = t?.category||"";
  document.getElementById("m-effort").value     = t?.effort||"1h";
  document.getElementById("m-priority").value   = t?.priority||"Medium";
  document.getElementById("m-status").value     = t?.status||"Not started";
  document.getElementById("m-delegated").value  = t?.delegatedTo||"";
  document.getElementById("m-notes").value      = t?.notes||"";
  document.getElementById("m-lightweight").checked = t?.lightweight||false;
  document.getElementById("m-nth").checked      = t?.niceToHave||false;
  document.getElementById("m-meta").innerHTML   = t
    ? `Original: <b>${fmtFull(t.originalDate)}</b> &nbsp;·&nbsp; Rolled: <b>${t.rolledOverCount}×</b> &nbsp;·&nbsp; ID: ${t.id}`
    : "";
  // Dependency picker
  editingDeps = [...(t?.dependsOn || [])];
  document.getElementById("m-dep-search").value = "";
  document.getElementById("m-dep-results").classList.remove("open");
  renderDepChips();
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.getElementById("m-dep-results").classList.remove("open");
  editingId = null;
  editingDeps = [];
}

function saveModal() {
  const data = {
    task:        document.getElementById("m-task").value.trim(),
    date:        document.getElementById("m-date").value,
    project:     document.getElementById("m-project").value,
    category:    document.getElementById("m-category").value.trim(),
    effort:      document.getElementById("m-effort").value,
    priority:    document.getElementById("m-priority").value,
    status:      document.getElementById("m-status").value,
    delegatedTo: document.getElementById("m-delegated").value.trim(),
    notes:       document.getElementById("m-notes").value.trim(),
    lightweight: document.getElementById("m-lightweight").checked,
    niceToHave:  document.getElementById("m-nth").checked,
    completed:   document.getElementById("m-status").value==="Done",
    dependsOn:   [...editingDeps],
  };
  if(!data.task){ alert("Task name is required."); return; }
  if(!data.date){ alert("Date is required."); return; }

  if(editingId) {
    const idx = tasks.findIndex(t=>t.id===editingId);
    if(idx!==-1) tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.push({ id:uid(), originalDate:data.date, rolledOverCount:0, ...data });
  }
  saveTasks(); closeModal(); renderAll();
}

function deleteTask(id) {
  if(!confirm("Delete this task?")) return;
  tasks = tasks.filter(t=>t.id!==id);
  saveTasks(); closeModal(); renderAll();
}

function dupeTask(id) {
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  tasks.push({ ...t, id:uid(), task:t.task+" (copy)", completed:false, rolledOverCount:0, originalDate:t.date });
  saveTasks(); closeModal(); renderAll();
}

function resetAll() {
  if(!confirm("Reset ALL tasks to the original seed schedule? All progress will be lost.")) return;
  tasks = JSON.parse(JSON.stringify(SEED_TASKS));
  saveTasks(); renderAll();
}

function exportCSV() {
  const hdr = ["id","date","originalDate","task","category","project","priority","status","effort","delegatedTo","notes","lightweight","niceToHave","completed","rolledOverCount"];
  const rows = tasks.map(t=>hdr.map(k=>{
    const v = t[k];
    return (typeof v==="string" && (v.includes(",")||v.includes('"')||v.includes("\n")))
      ? `"${v.replace(/"/g,'""')}"` : (v??""  );
  }).join(","));
  dl([hdr.join(","), ...rows].join("\n"), "wedding-move-tasks.csv", "text/csv");
}

function exportJSON() {
  dl(JSON.stringify(tasks, null, 2), "wedding-move-tasks.json", "application/json");
}

function importJSON(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const arr = JSON.parse(e.target.result);
      if(!Array.isArray(arr)) throw new Error("Expected array");
      tasks = arr; saveTasks(); renderAll();
      alert(`Imported ${tasks.length} tasks.`);
    } catch(err) { alert("Import failed: "+err.message); }
  };
  r.readAsText(file);
}

function dl(content, name, type) {
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([content],{type})),
    download: name
  });
  a.click();
}

function quickAdd() {
  const name = document.getElementById("qa-name").value.trim();
  if(!name) return;
  const date = document.getElementById("qa-date").value || APP_TODAY;
  tasks.push({
    id:uid(), date, originalDate:date,
    task:name, category:"Misc",
    project:     document.getElementById("qa-project").value,
    priority:    document.getElementById("qa-priority").value,
    delegatedTo: document.getElementById("qa-assignee").value,
    status:"Not started", effort:"30m",
    notes:"",
    lightweight:false, niceToHave:false, completed:false, rolledOverCount:0
  });
  saveTasks();
  document.getElementById("qa-name").value = "";
  renderAll();
}

// ==============================================================
// SECTION 8: EVENT BINDING
// ==============================================================

function bindAll() {
  // Filters
  const fmap = {
    "f-project":  v=>{ filters.project=v;  renderTable(); renderCal(); },
    "f-status":   v=>{ filters.status=v;   renderTable(); },
    "f-priority": v=>{ filters.priority=v; renderTable(); },
    "f-date":     v=>{ filters.date=v;     renderTable(); renderCal(); },
    "f-assignee": v=>{ filters.assignee=v; renderTable(); },
  };
  Object.entries(fmap).forEach(([id,fn])=>{
    document.getElementById(id).addEventListener("change", e=>fn(e.target.value));
  });
  document.getElementById("f-rolled").addEventListener("change", e=>{ filters.rolledOnly=e.target.checked; renderTable(); });
  document.getElementById("f-overdue").addEventListener("change", e=>{ filters.overdueOnly=e.target.checked; renderTable(); });
  document.getElementById("s-field").addEventListener("change", e=>{ sortCfg.field=e.target.value; renderTable(); });
  document.getElementById("s-dir").addEventListener("change", e=>{ sortCfg.dir=e.target.value; renderTable(); });

  document.getElementById("btn-clear-date").addEventListener("click", ()=>{
    filters.date=""; document.getElementById("f-date").value=""; renderTable(); renderCal();
  });
  document.getElementById("btn-clear-filters").addEventListener("click", ()=>{
    filters={project:"",status:"",priority:"",date:"",rolledOnly:false,overdueOnly:false,assignee:""};
    ["f-project","f-status","f-priority","f-date","f-assignee"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("f-rolled").checked=false;
    document.getElementById("f-overdue").checked=false;
    selectedIds.clear(); renderBulkBar();
    renderCurrentView(); renderCal();
  });

  // Header actions
  document.getElementById("btn-reset").addEventListener("click", resetAll);
  document.getElementById("btn-export-csv").addEventListener("click", exportCSV);
  document.getElementById("btn-export-json").addEventListener("click", exportJSON);
  document.getElementById("btn-import-json").addEventListener("click", ()=>document.getElementById("file-import").click());
  document.getElementById("file-import").addEventListener("change", e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; });

  document.getElementById("btn-today").addEventListener("click", ()=>{
    filterByDate(APP_TODAY);
    document.getElementById("today-focus").scrollIntoView({behavior:"smooth"});
    const el=document.querySelector(`.cal-day[data-date="${APP_TODAY}"]`);
    if(el) el.scrollIntoView({block:"center",behavior:"smooth"});
  });

  document.getElementById("btn-theme").addEventListener("click", ()=>{
    const html=document.documentElement;
    const dark=html.dataset.theme==="dark";
    html.dataset.theme=dark?"light":"dark";
    document.getElementById("btn-theme").textContent=dark?"🌙 Dark":"☀️ Light";
    localStorage.setItem("planner_theme", html.dataset.theme);
  });

  // Modal
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("m-cancel").addEventListener("click", closeModal);
  document.getElementById("m-save").addEventListener("click", saveModal);
  document.getElementById("m-delete").addEventListener("click", ()=>{ if(editingId) deleteTask(editingId); });
  document.getElementById("m-dupe").addEventListener("click", ()=>{ if(editingId) dupeTask(editingId); });
  document.getElementById("modal-overlay").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeModal(); });

  // Quick add
  document.getElementById("btn-qa-add").addEventListener("click", quickAdd);
  document.getElementById("qa-name").addEventListener("keydown", e=>{ if(e.key==="Enter") quickAdd(); });

  // View tabs
  document.querySelectorAll(".vt").forEach(btn=>{
    btn.addEventListener("click", ()=>setView(btn.dataset.view));
  });

  // Select-all header checkbox
  document.getElementById("th-select-all").addEventListener("change", e=>toggleSelectAll(e.target.checked));

  // Bulk bar
  document.getElementById("btn-bulk-apply").addEventListener("click", applyBulkEdit);
  document.getElementById("btn-bulk-done").addEventListener("click", bulkMarkDone);
  document.getElementById("btn-bulk-delete").addEventListener("click", bulkDelete);
  document.getElementById("btn-bulk-deselect").addEventListener("click", bulkDeselect);

  // Table header sort
  document.querySelectorAll("th[data-sort]").forEach(th=>{
    th.addEventListener("click", ()=>{
      const f=th.dataset.sort;
      if(sortCfg.field===f) sortCfg.dir=sortCfg.dir==="asc"?"desc":"asc";
      else { sortCfg.field=f; sortCfg.dir="asc"; }
      document.getElementById("s-field").value=sortCfg.field;
      document.getElementById("s-dir").value=sortCfg.dir;
      renderTable();
    });
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", e=>{
    if(e.key==="Escape") closeModal();
    if((e.ctrlKey||e.metaKey) && e.key==="k"){ e.preventDefault(); document.getElementById("qa-name").focus(); }
  });

  // Close dep search results on outside click
  document.addEventListener("click", e=>{
    const dr = document.getElementById("m-dep-results");
    const ds = document.getElementById("m-dep-search");
    if(dr && ds && !dr.contains(e.target) && e.target!==ds) dr.classList.remove("open");
  });
}

// ==============================================================
// SECTION 9: INIT
// ==============================================================

function init() {
  // Restore saved theme
  const savedTheme = localStorage.getItem("planner_theme");
  if(savedTheme){
    document.documentElement.dataset.theme = savedTheme;
    document.getElementById("btn-theme").textContent = savedTheme==="dark"?"☀️ Light":"🌙 Dark";
  }

  // Default quick-add date
  document.getElementById("qa-date").value = APP_TODAY;

  // Load data & run rollover
  loadTasks();
  runRollover();

  // Wire up all events
  bindAll();

  // Render everything
  renderAll();

  // Scroll sidebar to today
  setTimeout(()=>{
    const el=document.querySelector(`.cal-day[data-date="${APP_TODAY}"]`);
    if(el) el.scrollIntoView({block:"center",behavior:"smooth"});
  }, 80);
}

init();
</script>
</body>
</html>
